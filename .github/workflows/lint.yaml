name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Formatting is owned by oxfmt.
      - run: npm run format:check
      # The change descriptions are generated from docs/changes.js; fail if the
      # generated documents are out of date.
      - run: npm run docs:check

  # Codec correctness for the menuinfo-nick install-time helper. Tests run
  # natively (no cross-compile) against a committed real menuinfo.dat fixture.
  menuinfo-nick:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: patch/menuinfo-nick
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: patch/menuinfo-nick
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
