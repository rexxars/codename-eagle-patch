name: CI

on:
  push:
    branches: [main]
    paths:
      - game/**
      - docker-dedicated/**
      - .github/workflows/ci.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      # Deliberately not ${{ github.repository }}: the repo is named for the
      # patch, but this image is the dedicated server. GHCR package names are
      # independent of the repo name (needs `packages: write`, which we have).
      IMAGE_NAME: rexxars/codename-eagle-dedicated
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          # textures.dat/leveltex.bin live in LFS and must be real files
          # for the image build
          lfs: true
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker-dedicated/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.50
